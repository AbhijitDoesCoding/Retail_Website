<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSMS | Premium Retail Experience</title>
    <meta name="description" content="Experience the pinnacle of luxury retail. Browse our curated collection and book an exclusive store visit.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar" id="main-nav">
        <div class="nav-container">
            <a href="/" class="logo" id="home-link">RSMS</a>
            <div class="search-container">
                <input type="text" id="navbar-search" placeholder="Search products..." class="search-input">
            </div>
            <div class="nav-actions">
                <button class="icon-btn" id="auth-btn" aria-label="Login">
                    <span id="auth-btn-text" style="font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;">Login</span>
                </button>
                <button class="icon-btn" id="cart-btn" aria-label="View Cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6zM3 6h18M16 10a4 4 0 0 1-8 0" />
                    </svg>
                    <span class="cart-count" id="cart-count">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main id="app-root">
        <!-- Content will be injected here -->
        <div class="loader-container" id="initial-loader">
            <div class="loader"></div>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Selection</h3>
            <button class="close-btn" id="close-cart">&times;</button>
        </div>
        <div class="cart-items" id="cart-items-list">
            <!-- Cart items will be injected here -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cart-total-amount">$0.00</span>
            </div>
            <button class="btn btn-primary btn-block" id="checkout-btn">Checkout</button>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- Modals Container -->
    <div id="modal-container"></div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
